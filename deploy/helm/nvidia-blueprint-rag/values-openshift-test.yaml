# OpenShift test override: NVIDIA-hosted LLM, self-hosted embedding/ranking/ingestion on L40S
#
# Usage:
#   helm install rag . -f values-openshift.yaml -f values-openshift-test.yaml \
#     --set imagePullSecret.password="$NGC_API_KEY" \
#     --set ngcApiSecret.password="$NGC_API_KEY" \
#     -n <namespace>
#
# Post-install (NIM Operator limitation — the SA it creates needs the pull secret):
#   oc secrets link nim-cache-sa ngc-secret --for=pull -n <namespace>
#   oc delete pod -l app.nvidia.com/nim-cache -n <namespace>

openshift:
  enabled: true
  routes:
    frontend:
      enabled: true
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect
    ragServer:
      enabled: true
      timeout: "300s"
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect

# --- Disable self-hosted LLM NIM (use NVIDIA API Catalog instead) ---
nimOperator:
  nim-llm:
    enabled: false
  nvidia-nim-llama-nemotron-embed-1b-v2:
    tolerations:
      - key: "g6-gpu"
        operator: Exists
        effect: NoSchedule
  nvidia-nim-llama-nemotron-rerank-1b-v2:
    tolerations:
      - key: "g6-gpu"
        operator: Exists
        effect: NoSchedule

# --- Point LLM-related endpoints to NVIDIA-hosted (empty = API Catalog) ---
envVars:
  APP_LLM_SERVERURL: ""
  APP_QUERYREWRITER_SERVERURL: ""
  APP_FILTEREXPRESSIONGENERATOR_SERVERURL: ""
  REFLECTION_LLM_SERVERURL: ""

# --- Ingestor server ---
ingestor-server:
  envVars:
    SUMMARY_LLM_SERVERURL: ""
  resources:
    limits:
      memory: "8Gi"
    requests:
      memory: "4Gi"
  tolerations:
    - key: "g6-gpu"
      operator: Exists
      effect: NoSchedule
  persistence:
    storageClass: "gp3-csi"

# --- NV-Ingest ---
nv-ingest:
  image:
    repository: "nvcr.io/nvidia/nemo-microservices/nv-ingest"
    tag: "26.3.0"
  resources:
    requests:
      cpu: "2"
      memory: "8Gi"
      nvidia.com/gpu: "0"
    limits:
      cpu: "4"
      memory: "16Gi"
      nvidia.com/gpu: "0"
  tolerations:
    - key: "g6-gpu"
      operator: Exists
      effect: NoSchedule
  nimOperator:
    graphic_elements:
      enabled: false
    table_structure:
      enabled: false
    ocr:
      tolerations:
        - key: "g6-gpu"
          operator: Exists
          effect: NoSchedule
    page_elements:
      tolerations:
        - key: "g6-gpu"
          operator: Exists
          effect: NoSchedule
  milvus:
    standalone:
      resources:
        requests: {}
        limits: {}
      tolerations:
        - key: "g6-gpu"
          operator: Exists
          effect: NoSchedule
      persistence:
        storageClass: "gp3-csi"
    etcd:
      persistence:
        storageClass: "gp3-csi"
    minio:
      persistence:
        storageClass: "gp3-csi"

# --- Disable observability stack ---
eck-elasticsearch:
  enabled: false

serviceMonitor:
  enabled: false

opentelemetry-collector:
  enabled: false

zipkin:
  enabled: false

kube-prometheus-stack:
  enabled: false
